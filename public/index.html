<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n-title="mainTitle">HelpDesk Lite</title>
  <script src="/js/lang-init.js"></script>
  <script src="/js/theme-init.js"></script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="app-header">
    <h1 data-i18n="appName">HelpDesk Lite</h1>
    <div class="header-right">
      <div class="page-controls">
        <button type="button" class="lang-toggle" data-i18n-aria="langToggle">
          <span class="lang-en">EN</span><span class="lang-sep">|</span><span class="lang-ar">عربي</span>
        </button>
        <button type="button" class="theme-toggle" data-i18n-aria="themeToggle">
          <span class="theme-toggle-icons" aria-hidden="true"><span class="icon-sun">☀</span><span class="icon-moon">☽</span></span>
          <span class="theme-toggle-track"><span class="theme-toggle-thumb"></span></span>
          <span class="theme-toggle-label">Dark</span>
        </button>
      </div>
      <time id="header-clock" class="header-clock" datetime=""></time>
      <span class="user-badge">
        <strong id="user-name">—</strong>
        <span class="role-tag" id="user-role">—</span>
      </span>
      <button type="button" class="btn btn-secondary btn-sm" id="logout-btn" data-i18n="logout">Logout</button>
    </div>
  </header>

  <div class="app-layout">
    <aside class="sidebar">
      <nav>
        <button type="button" class="nav-btn active" data-panel="tickets" data-i18n="navTickets">Tickets</button>
        <button type="button" class="nav-btn" data-panel="new" data-i18n="navNew">New request</button>
        <button type="button" class="nav-btn manager-only hidden" data-panel="dashboard" data-i18n="navDashboard">Dashboard</button>
      </nav>
    </aside>

    <main class="main-content">
      <section id="panel-tickets" class="panel active">
        <h2 data-i18n="tickets">Tickets</h2>
        <div class="toolbar">
          <select id="ticket-filter" class="staff-only hidden">
            <option value="" data-i18n="filterAllOpen">All open tickets</option>
            <option value="mine" data-i18n="filterMine">Assigned to me</option>
            <option value="unassigned" data-i18n="filterUnassigned">Unassigned</option>
          </select>
          <select id="status-filter">
            <option value="" data-i18n="filterAllStatuses">All statuses</option>
            <option value="New" data-i18n="status_New">New</option>
            <option value="Assigned" data-i18n="status_Assigned">Assigned</option>
            <option value="In Progress" data-i18n="status_In_Progress">In Progress</option>
            <option value="Resolved" data-i18n="status_Resolved">Resolved</option>
            <option value="Closed" data-i18n="status_Closed">Closed</option>
          </select>
        </div>
        <table class="ticket-table">
          <thead>
            <tr>
              <th data-i18n="colId">ID</th>
              <th data-i18n="colTitle">Title</th>
              <th data-i18n="colCategory">Category</th>
              <th data-i18n="colPriority">Priority</th>
              <th data-i18n="colStatus">Status</th>
              <th data-i18n="colAssignee">Assignee</th>
              <th data-i18n="colUpdated">Updated</th>
            </tr>
          </thead>
          <tbody id="ticket-tbody"></tbody>
        </table>
      </section>

      <section id="panel-new" class="panel">
        <h2 data-i18n="submitRequest">Submit a request</h2>
        <form id="new-ticket-form" class="new-ticket-form">
          <div class="form-group">
            <label for="new-title" data-i18n="title">Title</label>
            <input type="text" id="new-title" name="title" required maxlength="200">
          </div>
          <div class="form-group">
            <label for="new-description" data-i18n="description">Description</label>
            <textarea id="new-description" name="description" required></textarea>
          </div>
          <div class="form-group">
            <label for="new-category" data-i18n="category">Category</label>
            <select id="new-category" name="category" required></select>
          </div>
          <div class="form-group">
            <label for="new-priority" data-i18n="priority">Priority</label>
            <select id="new-priority" name="priority"></select>
          </div>
          <button type="submit" class="btn btn-primary" data-i18n="submitTicket">Submit ticket</button>
        </form>
      </section>

      <section id="panel-dashboard" class="panel manager-only hidden">
        <h2 data-i18n="managerDashboard">Manager dashboard</h2>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="value" id="stat-open">0</div>
            <div class="label" data-i18n="openTickets">Open tickets</div>
          </div>
        </div>
        <div class="dashboard-section">
          <h3 data-i18n="byStatus">By status</h3>
          <ul class="chart-list" id="list-by-status"></ul>
        </div>
        <div class="dashboard-section">
          <h3 data-i18n="byAssignee">By assignee</h3>
          <ul class="chart-list" id="list-by-assignee"></ul>
        </div>
        <div class="dashboard-section">
          <h3 data-i18n="byCategory">By category</h3>
          <ul class="chart-list" id="list-by-category"></ul>
        </div>
        <div class="dashboard-section">
          <h3 data-i18n="overdueTitle">Overdue (open &gt; 5 days)</h3>
          <div id="overdue-list"></div>
        </div>
      </section>
    </main>
  </div>

  <div id="ticket-modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title" data-i18n="ticket">Ticket</h3>
        <button type="button" class="modal-close" id="modal-close" data-i18n-aria="close">&times;</button>
      </div>
      <div class="meta-grid" id="modal-meta"></div>
      <div class="detail-description" id="modal-description"></div>
      <div class="detail-actions" id="modal-actions"></div>
      <div class="comments-section">
        <h4 data-i18n="comments">Comments</h4>
        <div id="modal-comments"></div>
        <form id="comment-form" class="comment-form">
          <textarea name="body" data-i18n-placeholder="commentPlaceholder" placeholder="Add a comment…" required></textarea>
          <button type="submit" class="btn btn-primary btn-sm" data-i18n="postComment">Post comment</button>
        </form>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/theme.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
